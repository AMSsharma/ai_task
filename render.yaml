services:
  - type: web
    name: ai-task-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ALLOWED_ORIGINS
        value: "http://task-triumph-forge.vercel.app" # This can be updated to specific frontend URLs after frontend is deployed
      - key: CACHE_TTL_SECONDS
        value: "86400"
      - key: GEMINI_API_KEY
        sync: false # Render will prompt the user to enter their API Key securely during deployment
